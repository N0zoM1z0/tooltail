name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-syntax:
    name: contract-syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse schemas and examples
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path("docs/schemas").glob("*.json")):
              json.loads(path.read_text(encoding="utf-8"))

          for path in sorted(Path("docs/examples").glob("*.json")):
              json.loads(path.read_text(encoding="utf-8"))

          for path in sorted(Path("docs/examples").glob("*.jsonl")):
              for number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  if line.strip():
                      try:
                          json.loads(line)
                      except json.JSONDecodeError as exc:
                          raise SystemExit(f"{path}:{number}: {exc}") from exc
          PY

  build-test:
    name: build-test
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore, format, build, and test
        shell: pwsh
        run: |
          if (-not (Test-Path "Tooltail.sln")) {
            Write-Host "::notice::Blueprint seed detected; M0 must create Tooltail.sln before build gates run."
            exit 0
          }

          dotnet restore Tooltail.sln --locked-mode
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet format Tooltail.sln --verify-no-changes --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build Tooltail.sln -c Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test Tooltail.sln -c Release --no-build --logger "trx;LogFileName=tooltail-tests.trx"
          exit $LASTEXITCODE

      - name: Upload Windows test results
        if: ${{ always() && hashFiles('**/*.trx') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-results
          path: "**/*.trx"
          if-no-files-found: ignore

  portable-test:
    name: portable-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run portable test projects
        shell: bash
        run: |
          projects=(
            tests/Tooltail.Domain.Tests/Tooltail.Domain.Tests.csproj
            tests/Tooltail.Application.Tests/Tooltail.Application.Tests.csproj
            tests/Tooltail.Contracts.Tests/Tooltail.Contracts.Tests.csproj
            tests/Tooltail.Infrastructure.Sqlite.Tests/Tooltail.Infrastructure.Sqlite.Tests.csproj
            tests/Tooltail.Features.FileSkills.Tests/Tooltail.Features.FileSkills.Tests.csproj
            tests/Tooltail.Adapters.AgentEvents.Tests/Tooltail.Adapters.AgentEvents.Tests.csproj
          )

          found=0
          for project in "${projects[@]}"; do
            if [[ -f "$project" ]]; then
              found=1
              dotnet restore "$project" --locked-mode
              dotnet test "$project" -c Release --no-restore
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "::notice::Blueprint seed detected; M0 must create portable test projects."
          fi
